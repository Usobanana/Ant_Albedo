<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merge & Defense - Ant Albedo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <div id="app">
    <!-- 1. タイトル画面 -->
    <section id="title-screen" class="screen">
      <div class="overlay-content">
        <h1 class="logo">Ant Albedo</h1>
        <p class="subtitle">Merge & Defense</p>
        <button id="to-selection-btn" class="primary-btn pulse">START GAME</button>
      </div>
    </section>

    <!-- 2. ステージ・デッキ選択画面 -->
    <section id="selection-screen" class="screen hidden">
      <div class="overlay-content">
        <h2 class="stage-title">STAGE 1: はじまりの草原</h2>
        <div id="deck-selection">
          <p>デッキ編成 (3つ選択)：</p>
          <div id="unit-options"></div>
        </div>
        <button id="start-battle-btn" class="primary-btn" disabled>BATTLE START (0/3)</button>
        <button id="back-to-title-btn" class="secondary-btn">BACK</button>
      </div>
    </section>

    <!-- 3. バトル・マージ画面 (メインゲーム) -->
    <section id="battle-screen" class="screen hidden">
      <button id="open-debug-btn" style="position:fixed; top:10px; right:10px; z-index:1001; background:rgba(0,0,0,0.5); color:white; border:none; padding:5px 10px; border-radius:4px; font-size:10px; cursor:pointer; font-weight:900;">DEBUG</button>
      
      <!-- Debug Menu -->
      <div id="debug-menu" style="position:fixed; top:40px; right:10px; background:rgba(0,0,0,0.9); color:white; padding:15px; border-radius:12px; z-index:1000; font-size:11px; border:1px solid #444; display:none; width:160px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
          <div style="font-weight:900; border-bottom:1px solid #444; margin-bottom:10px; color:var(--accent-color)">DEBUG TUNING</div>
          <div style="margin-bottom:10px">
            <div>Map Width: <span id="debug-width-val">1250</span></div>
            <input type="range" id="debug-width-slider" min="300" max="2500" step="50" value="1250" style="width:100%">
          </div>
          <div style="margin-bottom:10px">
            <div>Spawn Time: <span id="debug-spawn-val">60</span>s</div>
            <input type="range" id="debug-spawn-slider" min="5" max="120" step="1" value="60" style="width:100%">
          </div>
          <div style="margin-bottom:10px">
            <div>Enemy Scale (HP): <span id="debug-diff-val">1.0</span></div>
            <input type="range" id="debug-diff-slider" min="0.1" max="5.0" step="0.1" value="1.0" style="width:100%">
          </div>
          <button id="close-debug-btn" style="display:block; width:100%; margin-top:5px; background:var(--accent-color); border:none; color:white; cursor:pointer; padding:8px; border-radius:4px; font-weight:900">CLOSE</button>
      </div>

      <div id="battle-field">
        <div id="battle-container"></div>
      </div>

      <!-- ミニマップ兼カメラスクローラー -->
      <div id="minimap-container">
        <div id="minimap">
          <div id="minimap-viewport"></div>
          <div id="minimap-entities"></div>
        </div>
      </div>

      <div id="merge-field">
        <div id="merge-grid"></div>
      </div>
    </section>

    <!-- 4. リザルト画面 -->
    <section id="result-screen" class="screen hidden">
      <div class="overlay-content result-card">
        <h2 id="result-title">VICTORY!</h2>
        <button id="back-to-selection-btn" class="primary-btn">CONTINUE</button>
      </div>
    </section>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
